[check-calendar]
interval = "6 hours"
tool = "search_calendar"
goal = "Alert about any events today or tomorrow."
silent_if_empty = true

[news-digest]
interval = "6 hours"
tool = "get-news"
goal = "Select 3-5 articles relevant to my interests. Send a digest with title, one-line summary, and URL. Skip clickbait and fluff."
silent_if_empty = true

[twitter-digest]
interval = "4 hours"
tool = "twitter-feed"
goal = "Select 5-7 tweets relevant to my interests. Send a digest with title, summary, and URL. Skip memes and rage-bait."
silent_if_empty = true
