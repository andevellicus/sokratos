[morning-briefing]
schedule = "06:00"
actions = ["search_email", "get_weather", "search_calendar", "scan_feeds"]
goal = "Generate a morning briefing. Synthesize the action results (emails, weather, today's full schedule, top headlines) into a concise, scannable daily orientation (under 20 lines). Structure: schedule first, then weather, then top headlines, then any emails needing attention. Always send the briefing — even if the day is clear."
action_args.search_calendar = { time_min = "{{today}}", time_max = "{{tomorrow}}" }
action_args.scan_feeds = { count = 5 }

[check-calendar]
interval = "6 hours"
action = "search_calendar"
goal = "Alert about any events today or tomorrow."
silent_if_empty = true

[check-email]
interval = "5 minutes"
action = "search_email"
goal = "Alert about important new emails. Summarize each with sender, subject, and key action needed."
silent_if_empty = true

[feed-digest]
interval = "4 hours"
action = "scan_feeds"
goal = "Select 3-5 most interesting items across all feeds. Send a digest grouped by source with title, one-line summary, and link. Skip low-quality content."
silent_if_empty = true
action_args.scan_feeds = { count = 5 }

[evening-recap]
schedule = "20:00"
actions = ["search_calendar", "search_email", "scan_feeds"]
goal = "Generate an evening recap. Structure: tomorrow's schedule at a glance, any emails still needing attention from today, and 2-3 top stories you may have missed. Keep it under 15 lines — relaxed tone, no urgency unless something is actually urgent."
action_args.search_calendar = { time_min = "{{tomorrow}}", time_max = "{{tomorrow+1d}}" }
action_args.scan_feeds = { count = 3 }

[weekly-review]
interval = "7 days"
action = "weekly_review"
goal = "Synthesize a weekly review. Cover: goal progress (recommend retiring completed goals via save_memory), key conversation themes, notable work, and what to focus on next week. Keep it scannable — under 25 lines."
